name: Playwright E2E Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    name: Run Pytest on ${{ matrix.browser }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright pytest pytest-playwright pytest-xdist allure-pytest playwright-stealth
        playwright install chromium firefox webkit --with-deps
        
    - name: Run Pytest E2E Suite
      env:
        PYTHONPATH: .
      run: |
        # Run tests dynamically parameterized across 3 CPU workers for the specific matrix browser
        pytest tests/test_ebay_purchase.py -n 3 -v --browser ${{ matrix.browser }} --alluredir=reports/allure-results-${{ matrix.browser }}
        
    - name: Upload Allure Results Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-results-${{ matrix.browser }}
        path: reports/allure-results-${{ matrix.browser }}
        retention-days: 7
