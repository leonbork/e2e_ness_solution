name: Playwright Tests (with Allure History)

# Manual-only: playwright_e2e.yml already covers push/PR for all browsers.
# Run this manually when you want a persistent Allure report with history.
on:
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium --with-deps

    - name: Run Pytest in parallel (2 workers) on Chromium
      run: pytest -n 2 --browser chromium

    - name: Generate Allure Report
      uses: simple-elf/allure-report-action@v2
      if: always()
      with:
        allure_results: allure-results
        allure_history: allure-history
        keep_reports: 20

    - name: Upload Allure Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-results
        path: allure-results
        retention-days: 10
